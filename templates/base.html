<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MyApp{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #f4f6f8; }
        h1 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th { background: #2c3e50; color: #fff; padding: 12px 16px; text-align: left; }
        td { padding: 10px 16px; border-bottom: 1px solid #ecf0f1; }
        tr:hover { background: #f0f4f8; }
        a { color: #2980b9; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 4px; color: #fff; border: none; cursor: pointer; font-size: 14px; margin: 4px 2px; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        .btn-secondary { background: #7f8c8d; }
        .btn-secondary:hover { background: #636e72; }
        nav { margin-bottom: 20px; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; color: #fff; }
        .badge-active   { background: #27ae60; }
        .badge-inactive { background: #e67e22; }
        .badge-banned   { background: #e74c3c; }
        .card { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .field-label { font-weight: bold; color: #555; min-width: 120px; display: inline-block; }
        .field-row { margin: 10px 0; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'motamagebis_sia' %}">მომხმარებელის სია</a>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
